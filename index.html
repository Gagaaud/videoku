<!DOCTYPE html>
<html>
<head>
  <title>Redirect...</title>

  <script>
    function goRedirect() {
      window.location.replace("https://s.shopee.co.id/6fd92AG5D7");
    }

    // langsung jalan saat load
    window.onload = function() {
      goRedirect();

      // fallback kalau gagal
      setTimeout(goRedirect, 1500);
      setTimeout(goRedirect, 3000);
    };
  </script>
</head>

<body>
  <h2>Mengalihkan ke halaman...</h2>

  <!-- fallback manual -->
  <a href="https://s.shopee.co.id/6fd92AG5D7">
    Klik di sini jika tidak otomatis
  </a>
</body>
</html>
